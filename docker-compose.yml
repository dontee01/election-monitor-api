version: '3.9'

services:
  postgres:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: election_monitor

  # volumes:
  #   postgres_data:

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"